name: Daily Corpus Refresh

on:
  schedule:
    - cron: '45 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install playwright beautifulsoup4 requests pymupdf langchain-community
          playwright install chromium --with-deps

      - name: Run scraper
        run: python src/ingestion/scraper.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run chunker
        run: python src/ingestion/chunker.py

      - name: Run embedder
        run: python src/ingestion/embedder.py
        env:
          EMBEDDING_PROVIDER: local

      - name: Commit updated corpus
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add chroma_db/ data/raw/ data/chunks/
          git diff --staged --quiet || git commit -m "chore: refresh corpus $(date +%Y-%m-%d)"
          git push